<!DOCTYPE html>
<html lang="ru">
<head>
  <!-- ========================================================================
       СТРАНИЦА АВТОРИЗАЦИИ — YourProjectName [ВАРИАНТ GR]
       Точка входа на сайт. После входа → catalog.html
       Тестовые аккаунты: user/user123, manager/manager123, admin/admin123
       ======================================================================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — YourProjectName</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <span class="auth-variant-tag">Вариант GR</span>
    <h1>YourProjectName</h1>
    <p class="subtitle">Детские игрушки — вход в личный кабинет</p>

    <div id="register-success" class="alert alert-success hidden">
      Регистрация успешна. Войдите под своим логином.
    </div>

    <!-- Форма входа: POST /login (server.js) -->
    <form id="login-form" action="/login" method="POST">
      <div class="form-group">
        <label for="login">Логин</label>
        <input type="text" id="login" name="login" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <!-- КАПЧА (обязательно по ТЗ) -->
      <div class="form-group captcha-box">
        <label>Подтвердите, что вы не робот</label>
        <div id="captcha-container"></div>
        <input type="hidden" name="captcha_token" id="captcha_token">
        <input type="text" name="captcha_answer" id="captcha_answer" placeholder="Ответ" required class="form-group" style="margin-top:8px">
      </div>

      <button type="submit" class="btn btn-primary btn-block">Войти</button>
    </form>

    <div class="auth-divider">или</div>

    <!-- Вход как гость → роль guest, только просмотр каталога -->
    <form id="guest-form" action="/guest" method="POST" style="margin:0">
      <button type="button" id="guest-login-btn" class="btn btn-secondary btn-block">
        Войти как гость
      </button>
    </form>

    <div class="auth-links">
      Нет аккаунта? <a href="/reg.html">Зарегистрироваться</a>
    </div>
  </div>

  <script src="/js/captcha.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
